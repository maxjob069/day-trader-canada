<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayTrader Canada — Présentation Exclusive France</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:       #091827;
      --navy2:      #0E2236;
      --navy3:      #142D47;
      --green:      #3DC97F;
      --green-d:    #2DAA68;
      --cyan:       #1BC5DC;
      --cyan-d:     #12A0B8;
      --gold:       #F0A500;
      --gold-d:     #C88A00;
      --silver:     #B8C6D8;
      --white:      #F0F7FF;
      --muted:      #7A9AB8;
      --border:     rgba(255,255,255,0.07);
      --card-bg:    rgba(255,255,255,0.04);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--navy);color:var(--white);font-family:'Outfit',sans-serif;font-weight:400;line-height:1.65;overflow-x:hidden;}

    /* ─── TYPOGRAPHY ─── */
    h1,h2,h3{font-family:'Syne',sans-serif;font-weight:800;line-height:1.15;}
    .label{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;}
    p{color:rgba(240,247,255,.78);font-size:1.05rem;}

    /* ─── LAYOUT ─── */
    .container{max-width:1100px;margin:0 auto;padding:0 2rem;}
    .section{padding:5rem 0;}
    .section-alt{background:var(--navy2);}
    .section-dark{background:var(--navy3);}

    /* ─── HERO ─── */
    #hero{
      min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(27,197,220,.12) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(61,201,127,.08) 0%, transparent 50%),
                  var(--navy);
      padding:3rem 2rem;position:relative;overflow:hidden;
    }
    #hero::before{
      content:'';position:absolute;inset:0;
      background-image: repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.025) 39px,rgba(255,255,255,.025) 40px),
                        repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.025) 39px,rgba(255,255,255,.025) 40px);
      pointer-events:none;
    }
    .hero-logo{width:180px;margin-bottom:2rem;filter:drop-shadow(0 0 30px rgba(27,197,220,.35));animation:logoFloat 3s ease-in-out infinite;}
    @keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    .hero-badge{
      display:inline-flex;align-items:center;gap:.6rem;background:rgba(27,197,220,.1);border:1px solid rgba(27,197,220,.25);
      border-radius:2rem;padding:.4rem 1.1rem;margin-bottom:1.5rem;font-size:.82rem;color:var(--cyan);letter-spacing:.08em;
    }
    .hero-badge span{width:6px;height:6px;background:var(--cyan);border-radius:50%;display:inline-block;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.3);}}
    #hero h1{font-size:clamp(2.8rem,6vw,5.5rem);margin-bottom:1rem;letter-spacing:-.02em;}
    #hero h1 span{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    #hero .sub{font-size:clamp(1rem,2vw,1.25rem);color:var(--muted);max-width:650px;margin:0 auto 2.5rem;}
    .hero-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:.75rem;margin-top:1.5rem;}
    .hero-pill{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:2rem;padding:.4rem 1rem;font-size:.88rem;color:var(--silver);}
    .scroll-arrow{margin-top:3rem;display:flex;flex-direction:column;align-items:center;gap:.3rem;color:var(--muted);font-size:.8rem;letter-spacing:.1em;animation:bounce .8s ease-in-out infinite alternate;}
    @keyframes bounce{from{transform:translateY(0);}to{transform:translateY(6px);}}
    .scroll-arrow::after{content:'↓';font-size:1.4rem;}

    /* ─── STATS STRIP ─── */
    .stats-strip{background:linear-gradient(135deg,rgba(61,201,127,.1),rgba(27,197,220,.1));border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:2.5rem 0;}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;text-align:center;}
    .stat-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
    .stat-label{font-size:.82rem;color:var(--muted);margin-top:.3rem;text-transform:uppercase;letter-spacing:.07em;}

    /* ─── VISION SECTION ─── */
    .vision-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;}
    .vision-text h2{font-size:clamp(2rem,4vw,3rem);margin:1rem 0;}
    .vision-text h2 em{font-style:normal;color:var(--green);}
    .vision-checklist{margin-top:1.8rem;display:flex;flex-direction:column;gap:1rem;}
    .vision-check{display:flex;align-items:flex-start;gap:.9rem;background:var(--card-bg);border:1px solid var(--border);border-radius:.75rem;padding:1rem 1.2rem;}
    .vision-check .icon{width:36px;height:36px;border-radius:.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem;background:rgba(61,201,127,.12);}
    .vision-check p{font-size:.95rem;color:var(--silver);}
    .vision-card{background:linear-gradient(145deg,var(--navy3),var(--navy2));border:1px solid var(--border);border-radius:1.5rem;padding:2.5rem;display:flex;flex-direction:column;gap:1.5rem;}
    .dtc-logo-sm{width:140px;margin-bottom:.5rem;}
    .vision-quote{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:var(--white);line-height:1.4;}
    .vision-quote em{color:var(--cyan);font-style:normal;}
    .accredi-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
    .accredi-badge{background:rgba(240,247,255,.06);border:1px solid var(--border);border-radius:.5rem;padding:.4rem .9rem;font-size:.8rem;color:var(--muted);}

    /* ─── PROBLEM ─── */
    .problem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:3rem;}
    .problem-card{background:rgba(255,80,80,.05);border:1px solid rgba(255,80,80,.15);border-radius:1rem;padding:1.8rem;}
    .problem-icon{font-size:2rem;margin-bottom:1rem;}
    .problem-card h3{font-size:1.15rem;color:#FF8080;margin-bottom:.5rem;}
    .problem-card p{font-size:.9rem;}

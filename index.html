<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présentation Officielle | Day Trader Canada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --dtc-blue: #003366; --dtc-orange: #FF6600; }
        .bg-dtc-blue { background-color: var(--dtc-blue); }
        .text-dtc-blue { color: var(--dtc-blue); }
        .bg-dtc-orange { background-color: var(--dtc-orange); }
        .text-dtc-orange { color: var(--dtc-orange); }
        .border-dtc-orange { border-color: var(--dtc-orange); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-dtc-blue p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <img src="logo.jpg" alt="DTC Logo" class="h-12 w-auto rounded">
            <div class="hidden md:flex space-x-8 text-white font-medium">
                <a href="#vision" class="hover:text-dtc-orange transition">Vision</a>
                <a href="#formation" class="hover:text-dtc-orange transition">Formation</a>
                <a href="#accompagnement" class="hover:text-dtc-orange transition">Accompagnement</a>
                <a href="#preuves" class="hover:text-dtc-orange transition">Résultats</a>
            </div>
            <a href="#contact" class="bg-dtc-orange text-white px-6 py-2 rounded-full font-bold hover:scale-105 transition transform">Candidater</a>
        </div>
    </nav>

    <header id="vision" class="py-20 px-6 bg-white text-center border-b">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl font-extrabold text-dtc-blue mb-6">L'Excellence du Trading Nord-Américain</h1>
            <p class="text-2xl text-gray-600 mb-10 leading-relaxed">Maîtrisez les marchés US avec une méthodologie institutionnelle et un accompagnement en temps réel.</p>
            <div class="flex flex-wrap justify-center gap-4 text-sm font-bold uppercase tracking-widest text-dtc-orange">
                <span>NYSE</span> • <span>NASDAQ</span> • <span>Order Flow</span> • <span>Psychologie</span>
            </div>
        </div>
    </header>

    <section id="formation" class="py-20 px-6">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-bold text-dtc-blue mb-12 text-center">
